name: ci
on: [push]
jobs:
  ci_windows_x64:
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@v6
      - uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          install: >-
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-rust
            mingw-w64-ucrt-x86_64-openvr
      - run: cargo test
      - run: cargo build --release
      - run: |
          mkdir artifacts
          cd artifacts
          cp ../target/release/mimizu_vr.exe .
          cp /ucrt64/bin/libgcc_s_seh-1.dll  .
          cp /ucrt64/bin/libwinpthread-1.dll .
          cp /ucrt64/bin/libstdc++-6.dll     .
          cp /ucrt64/bin/libopenvr_api.dll   .
      - uses: actions/upload-artifact@v6
        with:
          name: windows_x64
          path: artifacts/*

  ci_linux_x64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: sudo apt -y install libopenvr-dev
      - run: cargo test
      - run: cargo build --release
      - uses: actions/upload-artifact@v6
        with:
          name: linux_x64
          path: target/release/mimizu_vr
